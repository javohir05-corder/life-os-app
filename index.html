<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life OS — Premium Notion Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-main: #06060c;
            --bg-gradient: radial-gradient(circle at 50% -20%, #1a153a 0%, #06060c 70%);
            --glass-card: rgba(22, 22, 38, 0.65);
            --glass-border: rgba(255, 255, 255, 0.07);
            --text-main: #ffffff;
            --text-muted: #8e8e9f;
            --accent-blur: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-glow: 0 8px 32px 0 rgba(99, 102, 241, 0.3);
            --accent-pink: #ec4899;
            --accent-green: #10b981;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none; user-select: none;
        }

        body {
            background: var(--bg-main); background-image: var(--bg-gradient); background-attachment: fixed;
            color: var(--text-main); padding: 20px 16px 140px 16px; min-height: 100vh; overflow-x: hidden;
        }

        .app-page { display: none; opacity: 0; transform: scale(0.98) translateY(10px); transition: all 0.3s ease; }
        .app-page.active-page { display: block; opacity: 1; transform: scale(1) translateY(0); }

        .premium-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .profile-area { display: flex; align-items: center; gap: 12px; }
        .avatar-glow { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-blur); padding: 2px; }
        .avatar-glow img { width: 100%; height: 100%; border-radius: 50%; background: #111; object-fit: cover; }
        .user-meta h2 { font-size: 18px; font-weight: 700; }
        .user-meta p { color: var(--text-muted); font-size: 12px; }

        .glass-premium-card {
            background: var(--glass-card); border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 20px; margin-bottom: 20px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }

        .stats-bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
        .bento-card { background: rgba(30, 30, 50, 0.35); border: 1px solid var(--glass-border); border-radius: 20px; padding: 16px; min-height: 105px; cursor: pointer; }
        .bento-card p { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        .bento-card h3 { font-size: 20px; font-weight: 700; margin-top: 8px; }

        .premium-row {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 18px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .row-left { display: flex; align-items: center; gap: 14px; }
        .row-icon-box { width: 40px; height: 40px; background: rgba(255, 255, 255, 0.04); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .row-text h4 { font-size: 14px; font-weight: 600; }
        .row-text p { font-size: 11px; color: var(--text-muted); }

        .btn-premium-action { background: rgba(99, 102, 241, 0.15); border: 1px solid rgba(99, 102, 241, 0.3); color: #a5b4fc; padding: 8px 16px; border-radius: 30px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .btn-premium-action.completed { background: var(--accent-green); border-color: transparent; color: #052e16; }

        .premium-input-group { margin-bottom: 16px; }
        .premium-input-group label { display: block; font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        .premium-input-group input, .premium-input-group select { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border); padding: 14px 18px; border-radius: 18px; color: white; font-size: 14px; outline: none; }

        .btn-premium-submit { width: 100%; background: var(--accent-blur); color: white; border: none; padding: 15px; border-radius: 20px; font-size: 14px; font-weight: 600; box-shadow: var(--accent-glow); cursor: pointer; }

        .widget-progress-container { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.02); padding: 14px; border-radius: 18px; margin-bottom: 12px; }
        .circle-svg { width: 48px; height: 48px; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 4; }
        .circle-fill { fill: none; stroke: #6366f1; stroke-width: 4; stroke-linecap: round; }

        .image_0c6934-tab-bar {
            position: fixed; bottom: 24px; left: 16px; right: 16px; height: 76px; background: rgba(26, 12, 18, 0.72);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex; justify-content: space-around; align-items: center; padding: 0 10px; z-index: 999999;
        }
        .tab-item-premium { display: flex; flex-direction: column; align-items: center; background: none; border: none; color: rgba(255, 255, 255, 0.45); font-size: 11px; width: 18%; cursor: pointer; }
        .tab-item-premium img { width: 28px; height: 28px; margin-bottom: 4px; }
        .tab-item-premium.active-premium-tab { color: #ffffff !important; font-weight: 700; }
        .tab-item-premium.active-premium-tab img { transform: scale(1.15); }
        .section-header { font-size: 11px; color: var(--text-muted); font-weight: bold; text-transform: uppercase; margin: 15px 0 10px 5px; }
    </style>
</head>
<body>

    <div class="premium-header">
        <div class="profile-area">
            <div class="avatar-glow"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=Sheikh" alt="Avatar"></div>
            <div class="user-meta"><h2 id="db-user-name">Salom!</h2><p>Premium Member 💎</p></div>
        </div>
    </div>

    <div id="page-dashboard" class="app-page active-page">
        <div class="glass-premium-card" style="background: linear-gradient(135deg, rgba(30,27,75,0.6) 0%, rgba(15,12,38,0.6) 100%);">
            <p style="font-size: 11px; color: var(--text-muted); text-transform: uppercase;">Mening Xarajatlarim (Jami)</p>
            <h1 id="fin-page-balance" style="font-size: 32px; font-weight: 800; margin-top: 4px;">0 UZS</h1>
        </div>

        <div class="stats-bento-grid">
            <div class="bento-card" onclick="switchTabDirect('habits', 1)"><p>💪 Odatlar</p><h3 id="db-streak" style="color: #fb923c;">0 ta</h3></div>
            <div class="bento-card" onclick="switchTabDirect('tasks', 2)"><p>✅ Vazifalar</p><h3 id="db-tasks" style="color: #60a5fa;">0 ta</h3></div>
            <div class="bento-card" onclick="switchTabDirect('finance', 3)"><p>💸 Xarajat</p><h3 id="db-expense" style="color: #f43f5e;">0 UZS</h3></div>
            <div class="bento-card" onclick="switchTabDirect('goals', 4)"><p>🎯 Maqsadlar</p><h3 id="db-goals" style="color: #c084fc;">0 ta</h3></div>
        </div>
    </div>

    <div id="page-habits" class="app-page">
        <div class="glass-premium-card">
            <div class="premium-input-group">
                <label>Yangi Odat Nomi</label>
                <input type="text" id="habit-title-input" placeholder="Masalan: SAT Math 10 ta masala">
            </div>
            <button class="btn-premium-submit" onclick="submitNewHabit()">Odatni Qo'shish</button>
        </div>
        <div class="section-header">Mening Odatlarim</div>
        <div id="habits-list-container"></div>
    </div>

    <div id="page-tasks" class="app-page">
        <div class="glass-premium-card">
            <div class="premium-input-group">
                <label>Yangi vazifa nomi</label>
                <input type="text" id="task-title" placeholder="Masalan: Insho loyihasini tugatish">
            </div>
            <button class="btn-premium-submit" onclick="submitNewTask()">Vazifani kiritish</button>
        </div>
        <div class="section-header">Faol vazifalar ro'yxati</div>
        <div id="tasks-list-container"></div>
    </div>

    <div id="page-finance" class="app-page">
        <div class="glass-premium-card">
            <div class="premium-input-group">
                <label>Kategoriya</label>
                <select id="fin-operation-category">
                    <option value="Ovqat">Ovqat</option>
                    <option value="Yo'l">Yo'l</option>
                    <option value="Kiyim">Kiyim</option>
                    <option value="Kino">Kino</option>
                    <option value="Soglik">Sog'lik</option>
                    <option value="Aloqa">Aloqa</option>
                    <option value="Boshqa">Boshqa</option>
                </select>
            </div>
            <div class="premium-input-group">
                <label>Miqdor (UZS)</label>
                <input type="number" id="fin-operation-amount" placeholder="50000">
            </div>
            <div class="premium-input-group">
                <label>Tranzaksiya Izohi</label>
                <input type="text" id="fin-operation-name" placeholder="Masalan: Kafe xarajatlari">
            </div>
            <button class="btn-premium-submit" style="background: var(--accent-pink);" onclick="submitFinanceOperation()">Xarajatni Saqlash</button>
        </div>
    </div>

    <div id="page-goals" class="app-page">
        <div class="glass-premium-card">
            <div class="premium-input-group">
                <label>Strategik Maqsad</label>
                <input type="text" id="goal-title" placeholder="Masalan: SAT dan 1500+ ball">
            </div>
            <div class="premium-input-group">
                <label>Progress foizi (0-100)</label>
                <input type="number" id="goal-progress" placeholder="70">
            </div>
            <button class="btn-premium-submit" style="background: #8b5cf6;" onclick="submitNewGoal()">Maqsadni Qo'shish</button>
        </div>
        <div class="section-header">Maqsadlar Progressi</div>
        <div id="goals-list-container"></div>
    </div>

    <div class="image_0c6934-tab-bar">
        <button class="tab-item-premium active-premium-tab" onclick="switchTab('dashboard', this)"><img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f3e0/512.webp"><div>Asosiy</div></button>
        <button class="tab-item-premium" onclick="switchTab('habits', this)"><img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f4aa_1f3fb/512.webp"><div>Odatlar</div></button>
        <button class="tab-item-premium" onclick="switchTab('tasks', this)"><img src="https://fonts.gstatic.com/s/e/notoemoji/latest/2705/512.webp"><div>Vazifalar</div></button>
        <button class="tab-item-premium" onclick="switchTab('finance', this)"><img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f4b0/512.webp"><div>Moliya</div></button>
        <button class="tab-item-premium" onclick="switchTab('goals', this)"><img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f3af/512.webp"><div>Maqsadlar</div></button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Sening yagona SheetDB API manziling (Faqat Sheet1 bilan ishlaydi)
        const SHEETDB_API_URL = "https://sheetdb.io/api/v1/oor0mxsj20xig";
        
        const telegramId = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : "6627458183";
        const firstName = tg.initDataUnsafe?.user?.first_name || "Foydalanuvchi";

        document.getElementById('db-user-name').innerText = "Salom, " + firstName + "!";

        function getFormattedDate() {
            const now = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            return `${pad(now.getDate())}.${pad(now.getMonth() + 1)}.${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
        }

        function switchTab(pageId, navButton) {
            document.querySelectorAll('.app-page').forEach(page => page.classList.remove('active-page'));
            document.querySelectorAll('.tab-item-premium').forEach(btn => btn.classList.remove('active-premium-tab'));
            document.getElementById('page-' + pageId).classList.add('active-page');
            navButton.classList.add('active-premium-tab');
            tg.HapticFeedback.impactOccurred('medium');
            syncCoreData();
        }

        function switchTabDirect(pageId, navIndex) {
            const btns = document.querySelectorAll('.tab-item-premium');
            switchTab(pageId, btns[navIndex]);
        }

        // BARCHA MA'LUMOTLARNI BITTA SHEET1 DAN QIDIRIB FILTRLASH
        async function syncCoreData() {
            try {
                const response = await fetch(`${SHEETDB_API_URL}/search?telegram_id=${telegramId}`);
                const allData = await response.json();
                
                if (!Array.isArray(allData)) return;

                // 1. Moliya hisobi (Xarajatlar)
                let totalExpense = 0;
                const financeItems = allData.filter(item => item.Tur === 'Xarajat');
                financeItems.forEach(item => { totalExpense += parseFloat(item.Nik) || 0; });
                document.getElementById('db-expense').innerText = totalExpense.toLocaleString('uz-UZ') + " UZS";
                document.getElementById('fin-page-balance').innerText = totalExpense.toLocaleString('uz-UZ') + " UZS";

                // 2. Odatlar ro'yxati
                const habitItems = allData.filter(item => item.Tur === 'Odat');
                const habitContainer = document.getElementById('habits-list-container');
                habitContainer.innerHTML = "";
                document.getElementById('db-streak').innerText = habitItems.length + " ta";
                if(habitItems.length > 0) {
                    habitItems.forEach(h => {
                        habitContainer.innerHTML += `
                            <div class="premium-row">
                                <div class="row-left"><div class="row-icon-box">💪</div><div class="row-text"><h4>${h.Nom}</h4><p>Xolati: ${h.Kategoriya}</p></div></div>
                                <button class="btn-premium-action ${h.Kategoriya === 'Bajarildi' ? 'completed' : ''}" onclick="completeHabitAction(this, '${h.Nom}')">${h.Kategoriya === 'Bajarildi' ? '✓ Done' : 'Bajarish'}</button>
                            </div>`;
                    });
                } else {
                    habitContainer.innerHTML = "<p style='text-align:center;color:var(--text-muted);font-size:12px;padding:20px;'>Odatlar yo'q. Yuqoridan yangi odat qo'shing!</p>";
                }

                // 3. Vazifalar ro'yxati
                const taskItems = allData.filter(item => item.Tur === 'Vazifa' && item.Kategoriya !== 'Bajarildi');
                const taskContainer = document.getElementById('tasks-list-container');
                taskContainer.innerHTML = "";
                document.getElementById('db-tasks').innerText = taskItems.length + " ta";
                if(taskItems.length > 0) {
                    taskItems.forEach(t => {
                        taskContainer.innerHTML += `
                            <div class="premium-row">
                                <div class="row-left"><div class="row-icon-box">📌</div><div class="row-text"><h4>${t.Nom}</h4></div></div>
                                <button class="btn-premium-action" onclick="completeTaskAction(this, '${t.Nom}')">Bajarildi</button>
                            </div>`;
                    });
                } else {
                    taskContainer.innerHTML = "<p style='text-align:center;color:var(--text-muted);font-size:12px;padding:20px;'>Faol vazifalar mavjud emas.</p>";
                }

                // 4. Maqsadlar ro'yxati
                const goalItems = allData.filter(item => item.Tur === 'Maqsad');
                const goalContainer = document.getElementById('goals-list-container');
                goalContainer.innerHTML = "";
                document.getElementById('db-goals').innerText = goalItems.length + " ta";
                if(goalItems.length > 0) {
                    goalItems.forEach(g => {
                        let pct = Math.min(Math.max(parseInt(g.Nik) || 0, 0), 100);
                        let strokeDash = (pct / 100) * 138;
                        goalContainer.innerHTML += `
                            <div class="widget-progress-container">
                                <div style="display:flex; align-items:center; gap:12px;"><span style="font-size:22px;">🎯</span><div><h4>${g.Nom}</h4></div></div>
                                <div style="display:flex; align-items:center; gap:10px;"><span style="font-weight:700;color:#6366f1;">${pct}%</span>
                                    <svg class="circle-svg"><circle class="circle-bg" cx="24" cy="24" r="22"></circle><circle class="circle-fill" cx="24" cy="24" r="22" style="stroke-dasharray: ${strokeDash} 138;"></circle></svg>
                                </div>
                            </div>`;
                    });
                } else {
                    goalContainer.innerHTML = "<p style='text-align:center;color:var(--text-muted);font-size:12px;padding:20px;'>Maqsadlar kiritilmagan.</p>";
                }

            } catch (err) { console.error("Sinxronizatsiya xatosi:", err); }
        }

        // 1. ODAT QO'SHISH
        async function submitNewHabit() {
            const title = document.getElementById('habit-title-input').value.trim();
            if(!title) return tg.showAlert("Odat nomini kiriting!");
            document.getElementById('habit-title-input').value = "";
            
            await fetch(SHEETDB_API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    "data": [{"Sana": getFormattedDate(), "Kategoriya": "Faol", "Nom": title, "Nik": "0", "telegram_id": telegramId, "Tur": "Odat"}]
                })
            });
            tg.showAlert("Odat qo'shildi! 💪");
            syncCoreData();
        }

        async function completeHabitAction(btn, name) {
            if(btn.classList.contains('completed')) return;
            btn.classList.add('completed'); btn.innerText = "✓ Done";
            await fetch(`${SHEETDB_API_URL}/Nom/${encodeURIComponent(name)}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({"data": {"Kategoriya": "Bajarildi"}})
            });
            syncCoreData();
        }

        // 2. VAZIFA QO'SHISH
        async function submitNewTask() {
            const title = document.getElementById('task-title').value.trim();
            if(!title) return;
            document.getElementById('task-title').value = "";
            
            await fetch(SHEETDB_API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    "data": [{"Sana": getFormattedDate(), "Kategoriya": "Faol", "Nom": title, "Nik": "0", "telegram_id": telegramId, "Tur": "Vazifa"}]
                })
            });
            syncCoreData();
        }

        async function completeTaskAction(btn, name) {
            btn.parentElement.remove();
            await fetch(`${SHEETDB_API_URL}/Nom/${encodeURIComponent(name)}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({"data": {"Kategoriya": "Bajarildi"}})
            });
            syncCoreData();
        }

        // 3. XARAJAT QO'SHISH
        async function submitFinanceOperation() {
            const category = document.getElementById('fin-operation-category').value;
            const amount = document.getElementById('fin-operation-amount').value;
            const nameInput = document.getElementById('fin-operation-name').value.trim() || "Xarajat";

            if(!amount) return tg.showAlert("Iltimos, summani kiriting!");
            document.getElementById('fin-operation-amount').value = "";
            document.getElementById('fin-operation-name').value = "";

            await fetch(SHEETDB_API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    "data": [{"Sana": getFormattedDate(), "Kategoriya": category, "Nom": nameInput, "Nik": amount, "telegram_id": telegramId, "Tur": "Xarajat"}]
                })
            });
            tg.showAlert("Xarajat jadvalga yozildi! 💸");
            syncCoreData();
        }

        // 4. MAQSAD QO'SHISH
        async function submitNewGoal() {
            const title = document.getElementById('goal-title').value.trim();
            const progress = document.getElementById('goal-progress').value || "0";
            if(!title) return tg.showAlert("Maqsad nomini kiriting!");
            
            document.getElementById('goal-title').value = "";
            document.getElementById('goal-progress').value = "";

            await fetch(SHEETDB_API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    "data": [{"Sana": getFormattedDate(), "Kategoriya": "Strategik", "Nom": title, "Nik": progress, "telegram_id": telegramId, "Tur": "Maqsad"}]
                })
            });
            tg.showAlert("Maqsad saqlandi! 🎯");
            syncCoreData();
        }

        window.onload = function() { syncCoreData(); };
    </script>
</body>
</html>
