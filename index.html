<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0D0D0C; /* True Dark */
            color: #FFFFFF;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .user-info h2 { font-size: 20px; font-weight: 600; }
        .user-info p { color: #8E8E93; font-size: 14px; }

        .premium-badge {
            background: linear-gradient(135deg, #FF007F, #7B2CBF);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
        }

        /* XP Progress Bar */
        .xp-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .xp-text {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .xp-bar-bg { background: rgba(255, 255, 255, 0.1); height: 8px; border-radius: 4px; overflow: hidden; }
        .xp-bar-fill {
            background: #39FF14;
            width: 0%; /* Dinamik to'ladi */
            height: 100%;
            box-shadow: 0 0 8px #39FF14;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Dashboard Card */
        .main-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            margin-bottom: 25px;
        }

        .main-card h3 { color: #8E8E93; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .balance { font-size: 36px; font-weight: 700; margin-bottom: 5px; color: #39FF14; }

        /* Interaktiv Odatlar Ro'yxati */
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; color: #8E8E93; }
        
        .habit-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .habit-info h4 { font-size: 16px; font-weight: 500; }
        .habit-info p { font-size: 12px; color: #8E8E93; margin-top: 2px; }

        .done-btn {
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid #39FF14;
            color: #39FF14;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .done-btn:active { transform: scale(0.95); }
        .done-btn.completed {
            background: #39FF14;
            color: #000000;
            box-shadow: 0 0 10px #39FF14;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <h2 id="user-display-name">Yuklanmoqda...</h2>
            <p>Life OS Ekotizimi</p>
        </div>
        <div class="premium-badge" id="premium-status">LOADING</div>
    </div>

    <div class="xp-container">
        <div class="xp-text">
            <span>Daraja: <b id="level-text">Level 1</b></span>
            <span id="xp-text">0 XP</span>
        </div>
        <div class="xp-bar-bg">
            <div class="xp-bar-fill" id="xp-bar-fill"></div>
        </div>
    </div>

    <div class="main-card">
        <h3>Tizimdagi Umumiy Ballingiz</h3>
        <div class="balance" id="total-xp-dashboard">0 XP</div>
    </div>

    <div class="section-title">🎯 Bugungi Asosiy Odatlar</div>
    
    <div id="habits-list">
        <div class="habit-item">
            <div class="habit-info">
                <h4>Kitob o'qish</h4>
                <p>Har kuni kamida 15 sahifa</p>
            </div>
            <button class="done-btn" onclick="completeHabit(this, 'Kitob o\'qish', 15)">Bajarildi</button>
        </div>
        <div class="habit-item">
            <div class="habit-info">
                <h4>Dasturlash (Coding)</h4>
                <p>Yangi Life OS funksiyalarini yozish</p>
            </div>
            <button class="done-btn" onclick="completeHabit(this, 'Dasturlash', 25)">Bajarildi</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 🔗 SHAXSIY SHEETDB API HAVOLANGIZ
        const SHEETDB_API_URL = "https://sheetdb.io/api/v1/oor0mxsj20xig";
        
        // Telegramdan foydalanuvchi ID sini xavfsiz olish
        const telegramId = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : "573892799"; // Sinov uchun defolt ID
        const firstName = tg.initDataUnsafe?.user?.first_name || "Dasturchi";
        
        document.getElementById('user-display-name').innerText = firstName;

        // 1. Google Sheet'dan Foydalanuvchi ma'lumotlarini yuklash (Real-time)
        async function loadUserData() {
            try {
                const response = await fetch(`${SHEETDB_API_URL}/search?telegram_id=${telegramId}&sheet=Users`);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const user = data[0];
                    const xp = parseInt(user.xp_points) || 0;
                    const isPremium = user.premium_status === "TRUE";

                    // UI elementlarini yangilash
                    document.getElementById('total-xp-dashboard').innerText = xp + " XP";
                    document.getElementById('xp-text').innerText = xp + " XP";
                    document.getElementById('premium-status').innerText = isPremium ? "👑 PREMIUM" : "⚡️ ODDIY";
                    if(isPremium) document.getElementById('premium-status').style.background = "linear-gradient(135deg, #FFD700, #FFA500)";

                    // Darajani hisoblash (Har 100 XP bitta daraja)
                    const level = Math.floor(xp / 100) + 1;
                    document.getElementById('level-text').innerText = "Level " + level;

                    // Progress bar chizig'ini to'ldirish Miqdori (%)
                    const progressPercent = xp % 100;
                    document.getElementById('xp-bar-fill').style.width = progressPercent + "%";
                }
            } catch (error) {
                console.error("Ma'lumot yuklashda xatolik:", error);
            }
        }

        // 2. Odat bajarilganda Google Sheet'ni yangilash va XP qo'shish
        async function completeHabit(button, habitName, xpReward) {
            if (button.classList.contains('completed')) return; // Agar oldin bosilgan bo'lsa to'xtatamiz

            tg.HapticFeedback.impactOccurred('heavy'); // Premium tebranish effekti
            button.classList.add('completed');
            button.innerText = "✓ Tayyor";

            try {
                // A) Google Sheet'ning 'Habits' varag'iga ma'lumot qo'shish
                const habitPayload = {
                    "data": [{
                        "telegram_id": telegramId,
                        "habit_name": habitName,
                        "streak": "1",
                        "last_completed": new Date().toLocaleDateString('uz-UZ')
                    }]
                };
                await fetch(`${SHEETDB_API_URL}?sheet=Habits`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(habitPayload)
                });

                // B) Google Sheet'ning 'Users' varag'ida foydalanuvchi XP ballarini yangilash
                // Buning uchun birinchi joriy XP ni olamiz
                const currentXpText = document.getElementById('total-xp-dashboard').innerText;
                const currentXp = parseInt(currentXpText) || 0;
                const newXp = currentXp + xpReward;

                await fetch(`${SHEETDB_API_URL}/telegram_id/${telegramId}?sheet=Users`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "data": { "xp_points": newXp } })
                });

                // Sahifadagi vizual ma'lumotlarni qayta yuklash
                loadUserData();

            } catch (error) {
                console.error("Odatni saqlashda xatolik:", error);
            }
        }

        // Sahifa ochilishi bilan ma'lumotlarni yuklaymiz
        loadUserData();
    </script>
</body>
</html>
